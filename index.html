<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Logo Writer 2.0</title>

  <!-- OG -->
  <meta property="og:title" content="Logo Writer 2.0 🐢">
  <meta property="og:description" content="The classic DOS Logo Writer, running in your browser.">
  <meta property="og:url" content="https://gustav1338.github.io/logowriter/">
  <meta property="og:image" content="https://gustav1338.github.io/logowriter/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    header {
      padding: 16px 20px 8px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0,229,255,0.4);
    }

    header p {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    #dos-container {
      width: 100%;
      max-width: 800px;
      padding: 0 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* js-dos canvas wrapper */
    #jsdos {
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,229,255,0.15);
    }

    .hint {
      margin-top: 10px;
      font-size: 0.72rem;
      color: #555;
      text-align: center;
    }

    /* Override js-dos UI to be minimal */
    .jsdos-rg {
      border-radius: 8px !important;
      overflow: hidden !important;
    }
  </style>
</head>
<body>
  <header>
    <h1>🐢 Logo Writer 2.0</h1>
    <p>DOS classic · running in your browser</p>
  </header>

  <div id="dos-container">
    <div id="jsdos"></div>
    <p class="hint">Tap the screen to capture keyboard · ESC exits full screen</p>
  </div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    const el = document.getElementById("jsdos");
    Dos(el, {
      url: "./bundle.jsdos",
      theme: "dark",
      noSideBar: true,
      noFullscreenButton: false,
    });
  </script>
</body>
</html>
